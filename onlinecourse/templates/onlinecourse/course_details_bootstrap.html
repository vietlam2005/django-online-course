<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Course</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-3">
        <h2>{{ course.name }}</h2>
        <p>{{ course.description }}</p>
        
        <h3>Lessons</h3>
        <div class="list-group">
            {% for lesson in course.lesson_set.all %}
                <div class="list-group-item">
                    <h5>{{ lesson.title }}</h5>
                </div>
            {% endfor %}
        </div>

        <h3 class="mt-4">Exam</h3>
        <form action="{% url 'onlinecourse:submit' course.id %}" method="post">
            {% csrf_token %}
            {% for question in course.question_set.all %}
                <div class="card mt-3">
                    <div class="card-header"><h5>{{ question.question_text }}</h5></div>
                    <div class="card-body">
                        {% for choice in question.choice_set.all %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="choice_{{ choice.id }}" value="{{ choice.id }}" id="choice_{{ choice.id }}">
                                <label class="form-check-label" for="choice_{{ choice.id }}">
                                    {{ choice.choice_text }}
                                </label>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
            <button class="btn btn-success mt-3" type="submit">Submit Exam</button>
        </form>
    </div>
</body>
</html>
